name: CI pipeline
 
on:
  push:
    branches: [main]
  pull_request
    branches: [main]

jobs:
   test:
     name: Run tests
     runs-on: ubuntu-latest

     steps:
       - name: Checkout GitHub code
         uses: actions/checkout@v4

       - name: Setup Node.js
         uses: actions/setup-node@v4
         with
           node-version: '20'

       - run: npm install
       - run: npm test
